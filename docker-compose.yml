services:
  postgres:
    image: postgres:16
    container_name: lockhaven-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lockhaven_dev
    ports:
      - "5432:5432"
    volumes:
      - lockhaven-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lockhaven_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault:1.17
    container_name: lockhaven-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    command: vault server -dev
    volumes:
      - lockhaven-vault-data:/vault/file

volumes:
  lockhaven-postgres-data:
  lockhaven-vault-data:
